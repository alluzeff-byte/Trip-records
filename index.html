<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trip Records</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Login screen ────────────────────────────────────────────────── */
        #login-screen {
            position: fixed;
            inset: 0;
            background: #1a1a2e;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #login-box {
            background: #fff;
            border-radius: 16px;
            padding: 48px 40px;
            max-width: 360px;
            width: 100%;
            text-align: center;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }
        #login-box h1 {
            font-size: 26px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        #login-box p {
            color: #888;
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        #login-btn {
            background: #4361ee;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 13px 0;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.15s;
        }
        #login-btn:hover { background: #3451d1; }

        /* ── Toolbar ─────────────────────────────────────────────────────── */
        #toolbar {
            background: #1a1a2e;
            color: #e0e0e0;
            padding: 0 20px;
            height: 54px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            border-bottom: 1px solid #2d2d4a;
            box-shadow: 0 2px 8px rgba(0,0,0,0.35);
        }
        #toolbar h1 {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            letter-spacing: 0.3px;
            margin-right: 4px;
        }
        .tb-btn {
            background: #2d2d4a;
            color: #ccc;
            border: 1px solid #3d3d5e;
            padding: 6px 13px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12.5px;
            font-weight: 500;
            white-space: nowrap;
            transition: background 0.15s, color 0.15s;
        }
        .tb-btn:hover { background: #3d3d5e; color: #fff; }
        .tb-btn.primary { background: #4361ee; border-color: #4361ee; color: #fff; }
        .tb-btn.primary:hover { background: #3451d1; }
        #file-input { display: none; }
        #status {
            font-size: 12px;
            color: #777;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        #status.error { color: #e57373; }
        #status.ok    { color: #81c784; }
        #user-info {
            font-size: 12px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        /* ── Map ─────────────────────────────────────────────────────────── */
        #map { flex: 1; }

        /* ── Marker labels ───────────────────────────────────────────────── */
        .marker-label {
            background: rgba(255,255,255,0.93) !important;
            border: none !important;
            border-radius: 4px !important;
            padding: 2px 7px !important;
            font-size: 11.5px !important;
            font-weight: 600 !important;
            color: #1a1a2e !important;
            box-shadow: 0 1px 5px rgba(0,0,0,0.22) !important;
            white-space: nowrap !important;
            pointer-events: none !important;
        }
        .marker-label::before { display: none !important; }

        /* ── Modal overlay ───────────────────────────────────────────────── */
        #modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        #modal.active { display: flex; }

        #modal-box {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            width: 100%;
            max-width: min(96vw, 960px);
            max-height: 96vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 24px 64px rgba(0,0,0,0.55);
            animation: pop-in 0.17s ease;
        }
        @keyframes pop-in {
            from { transform: scale(0.91); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }

        #modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 22px;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
        }
        #modal-name { font-size: 20px; font-weight: 700; color: #1a1a2e; }
        #modal-close {
            background: #f0f0f0;
            border: none;
            border-radius: 50%;
            width: 32px; height: 32px;
            font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: #555; flex-shrink: 0;
            transition: background 0.15s;
        }
        #modal-close:hover { background: #ddd; color: #111; }

        #modal-body { overflow-y: auto; flex: 1; }

        /* ── Gallery ─────────────────────────────────────────────────────── */
        #gallery-wrap { background: #111; display: flex; flex-direction: column; }
        #gallery-stage { display: flex; align-items: center; min-height: 320px; }

        .gallery-nav {
            background: rgba(255,255,255,0.1);
            border: none; color: #fff; font-size: 32px;
            width: 48px; flex-shrink: 0; align-self: stretch;
            cursor: pointer; transition: background 0.15s;
            display: flex; align-items: center; justify-content: center;
        }
        .gallery-nav:hover:not(:disabled) { background: rgba(255,255,255,0.25); }
        .gallery-nav:disabled { opacity: 0.15; cursor: default; }
        .gallery-nav.hidden { visibility: hidden; }

        #gallery-view {
            flex: 1; display: flex; align-items: center; justify-content: center;
            min-height: 320px; padding: 14px 0;
        }
        #gallery-img {
            display: none; max-width: 100%; max-height: 68vh;
            object-fit: contain; border-radius: 2px;
        }
        #gallery-loading { color: rgba(255,255,255,0.5); font-size: 13px; }
        #gallery-error {
            display: none; color: #ff8080; font-size: 13px;
            text-align: center; padding: 0 20px; line-height: 1.6;
        }
        #gallery-counter {
            text-align: center; color: rgba(255,255,255,0.45);
            font-size: 11.5px; padding: 6px 0 10px; letter-spacing: 0.5px;
        }
        #gallery-counter:empty { padding: 0; }

        /* ── Info section ────────────────────────────────────────────────── */
        #modal-info { padding: 18px 22px 22px; display: flex; flex-direction: column; gap: 18px; }
        .info-label {
            display: block; font-size: 10.5px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.9px;
            color: #aaa; margin-bottom: 6px;
        }
        #modal-dates-val { font-size: 17px; font-weight: 700; color: #1a1a2e; }
        #modal-dates-val.empty { color: #ccc; font-size: 15px; font-weight: 400; }

        .info-list { list-style: none; display: flex; flex-direction: column; }
        .info-list li {
            padding: 7px 0; font-size: 13.5px; color: #333;
            border-bottom: 1px solid #f0f0f0;
            display: flex; align-items: center; gap: 8px;
        }
        .info-list li:last-child { border-bottom: none; }
        .info-list li.empty { color: #bbb; font-style: italic; }

        #modal-sites-list li::before {
            content: ''; width: 6px; height: 6px;
            border-radius: 50%; background: #2a9d8f; flex-shrink: 0;
        }
        #modal-sites-list li.empty::before { background: #ddd; }
        #modal-attenders-list li::before {
            content: ''; width: 6px; height: 6px;
            border-radius: 50%; background: #4361ee; flex-shrink: 0;
        }
        #modal-attenders-list li.empty::before { background: #ddd; }
    </style>
</head>
<body>

<!-- ── Login screen (hidden once authenticated) ───────────────────────────── -->
<div id="login-screen">
    <div id="login-box">
        <h1>Trip Records</h1>
        <p>This is a private family album.<br>Please log in to continue.</p>
        <button id="login-btn">Log in</button>
    </div>
</div>

<div id="toolbar">
    <h1>Trip Records</h1>
    <button class="tb-btn primary" id="reload-btn">&#8635; Reload</button>
    <label class="tb-btn" for="file-input">Load file…</label>
    <input type="file" id="file-input" accept=".json" />
    <span id="status">Loading locations.json…</span>
    <span id="user-info"></span>
    <button class="tb-btn" id="logout-btn">Log out</button>
</div>

<div id="map"></div>

<div id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-name">
    <div id="modal-box">
        <div id="modal-header">
            <span id="modal-name"></span>
            <button id="modal-close" aria-label="Close">&#x2715;</button>
        </div>
        <div id="modal-body">
            <div id="gallery-wrap">
                <div id="gallery-stage">
                    <button class="gallery-nav" id="gallery-prev" aria-label="Previous image">&#8249;</button>
                    <div id="gallery-view">
                        <div id="gallery-loading">Loading images…</div>
                        <img id="gallery-img" alt="" />
                        <div id="gallery-error"></div>
                    </div>
                    <button class="gallery-nav" id="gallery-next" aria-label="Next image">&#8250;</button>
                </div>
                <div id="gallery-counter"></div>
            </div>
            <div id="modal-info">
                <div class="info-block">
                    <span class="info-label">Dates</span>
                    <span id="modal-dates-val"></span>
                </div>
                <div class="info-block">
                    <span class="info-label">Sites</span>
                    <ul id="modal-sites-list" class="info-list"></ul>
                </div>
                <div class="info-block">
                    <span class="info-label">Attenders</span>
                    <ul id="modal-attenders-list" class="info-list"></ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const GITHUB_API_IMAGES = 'https://api.github.com/repos/alluzeff-byte/Trip-records/contents/images/';

// ── Map ──────────────────────────────────────────────────────────────────────
const map = L.map('map', { preferCanvas: true }).setView([54.5, -3.5], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
}).addTo(map);

let activeMarkers = [];
const BASE_STYLE = {
    radius: 9, fillColor: '#4361ee', color: '#ffffff',
    weight: 2.5, opacity: 1, fillOpacity: 0.88
};

// ── Folder image cache ───────────────────────────────────────────────────────
const folderImageCache = new Map();

async function fetchFolderImages(folders) {
    const urls = [];
    for (const folder of folders) {
        const name = folder.trim();
        if (!name) continue;
        const key = name.toLowerCase();

        if (!folderImageCache.has(key)) {
            try {
                const apiUrl = GITHUB_API_IMAGES + encodeURIComponent(name);
                console.log('[images] fetching', apiUrl);
                const res = await fetch(apiUrl);
                if (!res.ok) {
                    const body = await res.text();
                    let msg; try { msg = JSON.parse(body).message; } catch { msg = body; }
                    console.error('[images] API error', res.status, msg);
                    folderImageCache.set(key, { error: `GitHub API ${res.status}: ${msg}` });
                } else {
                    const files = await res.json();
                    console.log('[images] contents:', files.map(f => f.name));
                    const imgUrls = files
                        .filter(f => f.type === 'file' && /\.(jpe?g|png|gif|webp|avif)$/i.test(f.name))
                        .sort((a, b) => a.name.localeCompare(b.name))
                        .map(f => f.download_url);
                    folderImageCache.set(key, imgUrls);
                }
            } catch (err) {
                console.error('[images] fetch failed:', err);
                folderImageCache.set(key, { error: err.message });
            }
        }

        const cached = folderImageCache.get(key);
        if (Array.isArray(cached)) urls.push(...cached);
    }
    return urls;
}

// ── Date helpers ─────────────────────────────────────────────────────────────
function parseDate(str) {
    const parts = String(str || '').trim().split('/');
    if (parts.length !== 3) return str;
    const [d, m, y] = parts.map(Number);
    if (!d || !m || !y) return str;
    return new Date(y, m - 1, d).toLocaleDateString('en-GB', {
        day: 'numeric', month: 'short', year: 'numeric'
    });
}

function formatDates(dates) {
    if (!dates || dates.length === 0) return '';
    const start = parseDate(dates[0]);
    if (dates.length === 1 || dates[0] === dates[1]) return start;
    return `${start} – ${parseDate(dates[1])}`;
}

// ── Gallery state ────────────────────────────────────────────────────────────
let galleryPics  = [];
let galleryIdx   = 0;
let galleryGenId = 0;

const galleryImg     = document.getElementById('gallery-img');
const galleryView    = document.getElementById('gallery-view');
const galleryLoading = document.getElementById('gallery-loading');
const galleryError   = document.getElementById('gallery-error');
const galleryCounter = document.getElementById('gallery-counter');
const galleryPrev    = document.getElementById('gallery-prev');
const galleryNext    = document.getElementById('gallery-next');

function resetGallery() {
    galleryImg.style.display     = 'none';
    galleryImg.src               = '';
    galleryError.style.display   = 'none';
    galleryLoading.style.display = 'none';
    galleryView.style.display    = 'flex';
}

function showImage(index) {
    const myId = ++galleryGenId;
    const src  = galleryPics[index];
    galleryIdx = index;

    resetGallery();
    galleryLoading.style.display = 'block';

    const multi = galleryPics.length > 1;
    galleryCounter.textContent = multi ? `${index + 1} / ${galleryPics.length}` : '';
    galleryPrev.classList.toggle('hidden', !multi);
    galleryNext.classList.toggle('hidden', !multi);
    galleryPrev.disabled = index === 0;
    galleryNext.disabled = index === galleryPics.length - 1;

    const img = new Image();
    img.onload = () => {
        if (myId !== galleryGenId) return;
        galleryLoading.style.display = 'none';
        galleryImg.src = src;
        galleryImg.style.display = 'block';
    };
    img.onerror = () => {
        if (myId !== galleryGenId) return;
        galleryLoading.style.display = 'none';
        galleryError.innerHTML =
            'Could not load image.<br><small style="opacity:.6;word-break:break-all">' + src + '</small>';
        galleryError.style.display = 'block';
    };
    img.src = src;
}

galleryPrev.addEventListener('click', () => { if (galleryIdx > 0) showImage(galleryIdx - 1); });
galleryNext.addEventListener('click', () => { if (galleryIdx < galleryPics.length - 1) showImage(galleryIdx + 1); });

document.addEventListener('keydown', e => {
    if (!modal.classList.contains('active')) return;
    if (e.key === 'ArrowLeft')  galleryPrev.click();
    if (e.key === 'ArrowRight') galleryNext.click();
    if (e.key === 'Escape')     closeModal();
});

// ── Modal ────────────────────────────────────────────────────────────────────
const modal          = document.getElementById('modal');
const modalName      = document.getElementById('modal-name');
const modalDatesVal  = document.getElementById('modal-dates-val');
const modalSites     = document.getElementById('modal-sites-list');
const modalAttenders = document.getElementById('modal-attenders-list');

function fillList(ul, items, emptyText) {
    ul.innerHTML = '';
    const list = Array.isArray(items) ? items.filter(Boolean) : [];
    if (list.length === 0) {
        const li = document.createElement('li');
        li.textContent = emptyText;
        li.className = 'empty';
        ul.appendChild(li);
    } else {
        list.forEach(text => {
            const li = document.createElement('li');
            li.textContent = text;
            ul.appendChild(li);
        });
    }
}

async function openModal(entry) {
    const myGenId = ++galleryGenId;

    modalName.textContent = entry.name || '(unnamed)';

    const datesStr = formatDates(entry.dates);
    modalDatesVal.textContent = datesStr || 'Not specified';
    modalDatesVal.className   = datesStr ? '' : 'empty';

    fillList(modalSites,     entry.sites,     'None listed');
    fillList(modalAttenders, entry.attenders, 'None listed');

    galleryPics = [];
    resetGallery();
    galleryLoading.style.display = 'block';
    galleryPrev.classList.add('hidden');
    galleryNext.classList.add('hidden');
    galleryCounter.textContent = '';

    modal.classList.add('active');
    document.getElementById('modal-body').scrollTop = 0;

    const folders = entry.pictures ? [entry.pictures] : [];
    const pics = await fetchFolderImages(folders);
    if (myGenId !== galleryGenId) return;

    galleryPics = pics;
    if (pics.length === 0) {
        galleryLoading.style.display = 'none';
        const cached = entry.pictures ? folderImageCache.get(entry.pictures.toLowerCase()) : null;
        galleryError.textContent = (cached && !Array.isArray(cached))
            ? cached.error
            : entry.pictures
                ? `No images found in folder "${entry.pictures}".`
                : 'No image folder specified.';
        galleryError.style.display = 'block';
    } else {
        showImage(0);
    }
}

function closeModal() { modal.classList.remove('active'); }
document.getElementById('modal-close').addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

// ── Marker rendering ─────────────────────────────────────────────────────────
function loadLocations(entries, filename) {
    activeMarkers.forEach(m => m.remove());
    activeMarkers = [];

    let skipped = 0;
    const bounds = [];

    entries.forEach(entry => {
        const lat = parseFloat(entry.latitude);
        const lng = parseFloat(entry.longitude);
        if (isNaN(lat) || isNaN(lng)) { skipped++; return; }

        const name = entry.name || '(unnamed)';
        const marker = L.circleMarker([lat, lng], { ...BASE_STYLE })
            .bindTooltip(name, {
                permanent: true, direction: 'right',
                offset: [10, 0], className: 'marker-label'
            })
            .addTo(map);

        marker.on('mouseover', function () {
            this.setStyle({ fillColor: '#e63946', radius: 11 });
            this.bringToFront();
        });
        marker.on('mouseout', function () {
            this.setStyle({ fillColor: BASE_STYLE.fillColor, radius: BASE_STYLE.radius });
        });
        marker.on('click', () => openModal(entry));

        activeMarkers.push(marker);
        bounds.push([lat, lng]);
    });

    const n = activeMarkers.length;
    if (n === 0) { setStatus(`No valid entries in "${filename}".`, 'error'); return; }

    const skipNote = skipped ? `  (${skipped} skipped — missing coordinates)` : '';
    setStatus(`${n} location${n !== 1 ? 's' : ''} loaded from "${filename}"${skipNote}`, 'ok');

    if (bounds.length > 1)        map.fitBounds(bounds, { padding: [60, 60], maxZoom: 13 });
    else if (bounds.length === 1) map.setView(bounds[0], 11);
}

// ── Data fetching ─────────────────────────────────────────────────────────────
async function fetchJSON(path) {
    setStatus(`Loading ${path}…`);
    try {
        const res = await fetch(path, { cache: 'no-cache' });
        if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
        const entries = await res.json();
        loadLocations(entries, path);
    } catch (err) {
        const hint = location.protocol === 'file:'
            ? ' (Tip: serve via a local web server — file:// blocks fetch)'
            : '';
        setStatus(`Could not load ${path}: ${err.message}${hint}`, 'error');
    }
}

document.getElementById('file-input').addEventListener('change', function (e) {
    const file = e.target.files[0];
    if (!file) return;
    this.value = '';
    const reader = new FileReader();
    reader.onload = evt => {
        try {
            loadLocations(JSON.parse(evt.target.result), file.name);
        } catch (err) {
            setStatus('Error reading file: ' + err.message, 'error');
        }
    };
    reader.readAsText(file);
});

document.getElementById('reload-btn').addEventListener('click', () => fetchJSON('locations.json'));

function setStatus(msg, type = '') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = type;
}

// ── Auth ─────────────────────────────────────────────────────────────────────
const loginScreen = document.getElementById('login-screen');
const userInfo    = document.getElementById('user-info');
const logoutBtn   = document.getElementById('logout-btn');

const IS_LOCAL = ['localhost', '127.0.0.1'].includes(location.hostname);

function showApp(user) {
    loginScreen.style.display = 'none';
    if (user) userInfo.textContent = user.email;
    fetchJSON('locations.json');
}

function showLogin() {
    loginScreen.style.display = 'flex';
    userInfo.textContent = '';
    activeMarkers.forEach(m => m.remove());
    activeMarkers = [];
}

if (IS_LOCAL) {
    // Skip auth when running locally via Live Server
    showApp(null);
} else {
    netlifyIdentity.init();
    netlifyIdentity.on('init',   user => { if (user) showApp(user); else showLogin(); });
    netlifyIdentity.on('login',  user => { netlifyIdentity.close(); showApp(user); });
    netlifyIdentity.on('logout', ()   => showLogin());

    document.getElementById('login-btn').addEventListener('click', () => netlifyIdentity.open('login'));
    logoutBtn.addEventListener('click', () => netlifyIdentity.logout());
}
</script>
</body>
</html>
